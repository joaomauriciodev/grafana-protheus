server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: protheus
    static_configs:
      - targets:
          - localhost
        labels:
          job: protheus
          ambiente: producao
          # ajuste o caminho para onde seus logs estão no host
          __path__: C:/TOTVS/protheus_data/logs/fontes/*.log